spring.application.name=demo
Spring.datasource.url=${DATABASE_URL}
Spring.datasource.username=${DATABASE_USERNAME}
Spring.datasource.Password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
Spring.jpa.properties.hibernate.dialect=${DATABASE_DIELECTRIC}
jwt.secret=${JWT_SECRET}
Jwt.expirations=${JWT_EXPERIATION}
logging.level.org.springframework.security=DEBUG
logging.level.org.url.shortener=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.springframework.web.servlet=TRACE
frontend.url=${FRONTEND_URL}
spring.mail.host=${Spring_mailhost}
spring.mail.port=${Spring_mailport}
spring.mail.username=${Spring_mailID}
spring.mail.password=${Spring_mailPassword}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true